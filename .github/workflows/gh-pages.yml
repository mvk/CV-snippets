name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write


env:
  BUILD_DIR: ./build
  DEST_DIR: ./_site
  PREVIEW_DIR: 'preview'

concurrency:
  # Use different groups for PRs vs Main to allow them to run in parallel
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  # 0. env setup using outputs
  setup:
    runs-on: ubuntu-latest
    outputs:
      preview_dir: ${{ env.PREVIEW_DIR }}
    steps:
      - run: echo "Setting up environment..."

  # 1. Build job: Runs on both (to catch errors in PRs)

  build:
    runs-on: ubuntu-latest
    # We only run this if it's NOT a PR, OR we want to verify the build in a PR
    # But since pr-preview already builds, we can skip this on PRs to save minutes.
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: mvk/upload-pages-artifact@bump_upload_artifact
        # uses: actions/upload-pages-artifact@v6

  # 2. Deployment job: ONLY runs on main branch pushes

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # main as of 2026/03/25

  # 3. handle PR Previews
  # 3.1. PR-Preview Job: Only runs on PRs
  pr-preview-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build site with PR baseurl
        run: |
          JEKYLL_ENV=production bundle exec jekyll build --verbose --destination="${BUILD_DIR}" --baseurl="/${{ github.event.repository.name }}/${PREVIEW_DIR}/pr-${{ github.event.number }}"

      - name: Deploy PR under preview
        uses: mvk/actions-gh-pages@patch-2
        # TODO: uncomment this and delete the previous line after the PR specified in check-pr.yml workflow is merged
        # uses: peaceiris/actions-gh-pages@<proper value>
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.BUILD_DIR }}
          destination_dir: ${{ env.PREVIEW_DIR }}/pr-${{ github.event.number }}
          keep_files: false

      - name: Update PR Preview Comment
        uses: mvk/pr-preview-action@bump_up_deps_to_node24
        # uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ${{ env.BUILD_DIR }}
          umbrella-dir: ${{ env.PREVIEW_DIR }}

  # 3.2. Cleanup jobs

  pr-preview-cleanup-closed:
    needs: setup
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    uses: ./.github/workflows/pr-preview-cleanup.yml
    with:
      preview_dir: ${{ needs.setup.outputs.preview_dir }}

  pr-preview-cleanup-merged:
    needs: setup
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    uses: ./.github/workflows/pr-preview-cleanup.yml
    with:
      preview_dir: ${{ needs.setup.outputs.preview_dir }}
